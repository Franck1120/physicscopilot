# Kubernetes Service + HPA — PhysicsCopilot Go server
# Apply: kubectl apply -f infra/k8s/service.yaml

apiVersion: v1
kind: Service
metadata:
  name: physicscopilot-server
  namespace: default
  labels:
    app: physicscopilot
    component: server
  annotations:
    # Prometheus scrape target
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: physicscopilot
    component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# Horizontal Pod Autoscaler — scale 2→10 pods based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: physicscopilot-server
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: physicscopilot-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Ingress — TLS termination via cert-manager
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: physicscopilot-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - physicscopilot.app
      secretName: physicscopilot-tls
  rules:
    - host: physicscopilot.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: physicscopilot-server
                port:
                  name: http
