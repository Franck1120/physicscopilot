# Kubernetes Deployment — PhysicsCopilot Go server
# Apply: kubectl apply -f infra/k8s/deployment.yaml
# Requires: secret/physicscopilot-secrets (see deployment notes in docs/DEPLOYMENT.md)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: physicscopilot-server
  namespace: default
  labels:
    app: physicscopilot
    component: server
    version: "0.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: physicscopilot
      component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime deploy
  template:
    metadata:
      labels:
        app: physicscopilot
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: server
          image: ghcr.io/franck1120/physicscopilot-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: PORT
              value: "8080"
            - name: ENV
              value: production
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: physicscopilot-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: physicscopilot-secrets
                  key: SUPABASE_JWT_SECRET
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: physicscopilot-secrets
                  key: SUPABASE_SERVICE_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: physicscopilot-secrets
                  key: GEMINI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: physicscopilot-secrets
                  key: DATABASE_URL

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      securityContext:
        fsGroup: 1000

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: physicscopilot
                    component: server
