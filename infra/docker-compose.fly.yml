version: "3.9"

# ── PhysicsCopilot — Fly.io deploy stack ──────────────────────────────────────
# Companion compose file for Fly.io deployments using Dockerfile.fly.
# For local development use the root docker-compose.yml instead.
#
# Usage (Fly-like local test):
#   cp .env.example .env       # fill in your secrets
#   docker compose -f infra/docker-compose.fly.yml up
#
# CLIProxyAPI: must be running separately on the host at port 8085.
#   The server reaches it via host.docker.internal:8085 when GEMINI_API_KEY is absent.

services:
  # ── Go backend ──────────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.fly
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ../.env
    environment:
      PORT: "${PORT:-8080}"
      # When GEMINI_API_KEY is absent, GeminiService falls back to CLIProxyAPI.
      # host.docker.internal resolves to the Docker host on Windows/Mac (Docker Desktop)
      # and via extra_hosts on Linux.
      CLIPROXY_URL: "http://host.docker.internal:8085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8080}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Local Postgres (mirrors Supabase schema, for future persistence) ─────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       physicscopilot
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../supabase/migrations/20260411000000_initial_schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
