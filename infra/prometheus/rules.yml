# Prometheus recording rules for PhysicsCopilot.
# These pre-aggregate expensive queries so dashboards load instantly.
# File format: Prometheus v2 rule groups.
groups:
  - name: physicscopilot.http
    interval: 30s
    rules:
      # Pre-compute request rate per endpoint over 5m windows
      - record: job:http_requests_total:rate5m
        expr: sum(rate(http_requests_total[5m])) by (method, path, status)

      # Pre-compute p50 / p95 / p99 latency per path
      - record: job:http_request_duration_seconds:p50
        expr: histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path))

      - record: job:http_request_duration_seconds:p95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path))

      - record: job:http_request_duration_seconds:p99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path))

      # Error rate (4xx + 5xx)
      - record: job:http_error_rate:rate5m
        expr: |
          sum(rate(http_requests_total{status=~"[45].."}[5m])) /
          sum(rate(http_requests_total[5m]))

  - name: physicscopilot.websocket
    interval: 30s
    rules:
      # WebSocket message throughput
      - record: job:ws_messages_total:rate5m
        expr: sum(rate(ws_messages_total[5m])) by (type)

  - name: physicscopilot.ai
    interval: 30s
    rules:
      # AI inference p95 latency
      - record: job:ai_inference_duration_seconds:p95
        expr: histogram_quantile(0.95, sum(rate(ai_inference_duration_seconds_bucket[5m])) by (le))

  - name: physicscopilot.sessions
    interval: 60s
    rules:
      # Session creation rate
      - record: job:sessions_created_total:rate5m
        expr: rate(sessions_created_total[5m])
