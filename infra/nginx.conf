# nginx.conf — Reverse proxy for PhysicsCopilot Go server.
#
# Use cases:
#   - Production: TLS termination, HTTP/2, static file serving
#   - Development: Local proxy to forward to server on :8080
#
# Deploy: place this file in /etc/nginx/conf.d/physicscopilot.conf
# or use in Docker via: COPY infra/nginx.conf /etc/nginx/conf.d/default.conf

upstream physicscopilot_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name physicscopilot.app www.physicscopilot.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name physicscopilot.app www.physicscopilot.app;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/physicscopilot.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physicscopilot.app/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin"   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size     10m;    # camera frames are compressed JPEGs
    client_body_buffer_size  256k;
    keepalive_timeout        65;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/physicscopilot_access.log combined buffer=16k;
    error_log   /var/log/nginx/physicscopilot_error.log  warn;

    # ── WebSocket upgrade ─────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://physicscopilot_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket timeouts (camera streaming sessions can be long)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 5s;

        # Disable buffering for streaming
        proxy_buffering off;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://physicscopilot_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
    }

    # ── Health check (no auth required) ──────────────────────────────────────
    location /health {
        proxy_pass         http://physicscopilot_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
        access_log off;
    }

    # ── OpenAPI spec ──────────────────────────────────────────────────────────
    location /openapi.yaml {
        proxy_pass http://physicscopilot_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Block common probes ───────────────────────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|DS_Store)$ {
        deny all;
        return 404;
    }
}
