apiVersion: 1

groups:
  - orgId: 1
    name: physicscopilot-alerts
    folder: PhysicsCopilot
    interval: 1m
    rules:

      # Alert 1: Error rate > 5%
      # Fires when more than 5% of all messages result in an AI or DB error.
      - uid: physicscopilot-error-rate
        title: High Error Rate (>5%)
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: sum(rate(app_errors_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: prometheus
            model:
              expr: sum(rate(ws_messages_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A / ($B + 1)
              refId: C
              type: math
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Error rate exceeded 5%"
          description: "The ratio of app errors to total messages is above 5% for 2 minutes. Check Gemini API and database connectivity."
        labels:
          severity: warning
          team: physicscopilot

      # Alert 2: TTFR p95 > 5s
      # Fires when the 95th percentile Time-to-First-Response exceeds 5 seconds.
      - uid: physicscopilot-ttfr-p95
        title: TTFR p95 > 5s
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(session_time_to_first_response_seconds_bucket[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A
              refId: B
              type: math
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "TTFR p95 exceeded 5 seconds"
          description: "The 95th percentile Time-to-First-Response is above 5 seconds for 5 minutes. Gemini API may be slow or overloaded."
        labels:
          severity: warning
          team: physicscopilot
