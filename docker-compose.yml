version: "3.9"

# ── PhysicsCopilot — local dev stack ──────────────────────────────────────────
# Quick start:
#   cp .env.example .env        # fill in your secrets
#   make docker-up              # starts all services in background
#   make dev-server             # run Go server locally (or: make dev)
#
# Services:
#   server     – Go backend (port 8080)
#   cliproxy   – Gemini CLI proxy for local AI inference (port 8085)
#   postgres   – local Postgres mirroring Supabase schema (port 5432)
#   prometheus – metrics scraper (port 9090)
#   grafana    – dashboards (port 3000, admin/admin)
#
# Health probes: all services report healthy before dependents start.

networks:
  pc_net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  # ── Go backend ───────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: "${PORT:-8080}"
      APP_ENV: development
      # Database connection — constructed from the postgres service credentials.
      # Override via .env DATABASE_URL for non-default configurations.
      DATABASE_URL: "${DATABASE_URL}"
      # When GEMINI_API_KEY is absent, GeminiService falls back to CLIProxyAPI.
      CLIPROXY_URL: "http://cliproxy:8085"
    networks:
      - pc_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8080}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── CLIProxy — Gemini CLI proxy (local AI inference without API key) ─────────
  # Provides a drop-in REST API that delegates to the Gemini CLI binary.
  # Source: https://github.com/Franck1120/cliproxy (replace with your image)
  cliproxy:
    image: ghcr.io/franck1120/cliproxy:latest
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
    networks:
      - pc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Prometheus — metrics scraper ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - pc_net
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

  # ── Grafana — dashboards (admin/admin) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/physicscopilot.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - pc_net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Local Postgres (mirrors Supabase schema) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: physicscopilot
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - pc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
