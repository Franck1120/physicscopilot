# Dart/Flutter analysis options for PhysicsCopilot.
# Docs: https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these as errors (not just warnings)
    missing_return: error
    dead_code: warning
    unused_import: error
    unused_local_variable: warning
    invalid_annotation_target: ignore   # Riverpod codegen compat

  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - 'lib/generated/**'

linter:
  rules:
    # ── Style ────────────────────────────────────────────────────────────────
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_single_quotes: true
    require_trailing_commas: true
    always_use_package_imports: true

    unnecessary_null_checks: true

    # ── Safety ───────────────────────────────────────────────────────────────
    avoid_dynamic_calls: true
    avoid_print: true
    avoid_returning_null_for_future: true
    cancel_subscriptions: true
    close_sinks: true
    unawaited_futures: true

    # ── Riverpod / async ─────────────────────────────────────────────────────
    use_build_context_synchronously: true

    # ── Documentation ────────────────────────────────────────────────────────
    public_member_api_docs: false       # too verbose for this project size

    # ── Explicitly disabled ──────────────────────────────────────────────────
    lines_longer_than_80_chars: false   # handled by dart format
    sort_child_properties_last: true
