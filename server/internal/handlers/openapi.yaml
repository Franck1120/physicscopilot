openapi: "3.0.3"
info:
  title: PhysicsCopilot API
  version: "0.1.0"
  description: |
    REST and WebSocket API for the PhysicsCopilot AI repair-assistant server.

    **Authentication:**
    - `/api/*` — Bearer JWT via `Authorization: Bearer <token>` header or `?token=<jwt>` query param.
      When `SUPABASE_JWT_SECRET` is not set the server runs in dev mode and skips validation.
    - `/metrics` — HTTP Basic Auth (username `admin`, password from `METRICS_PASSWORD` env var).

    **Rate limiting:** 60 requests/min per IP, burst 10, applied to `/health` and all `/api/*` routes.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-server.example.com
    description: Production (replace with your actual host)

tags:
  - name: Monitoring
    description: Health and observability endpoints
  - name: Sessions
    description: Session lifecycle management
  - name: Knowledge Base
    description: Knowledge-base domain queries

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT. Pass via Authorization header or ?token= query param.
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Auth for /metrics (username "admin", password from METRICS_PASSWORD).

  responses:
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Device:
      type: object
      required: [brand, model]
      properties:
        brand:
          type: string
          example: "Prusa"
        model:
          type: string
          example: "MK4"

    Session:
      type: object
      required: [id, status, device, current_step, total_steps, created_at, last_activity]
      properties:
        id:
          type: string
          example: "a1b2c3d4e5f6"
        status:
          type: string
          enum: [active]
          example: "active"
        device:
          $ref: '#/components/schemas/Device'
        problem_detected:
          type: string
          nullable: true
          description: Detected problem description, omitted when null.
          example: "Stringing detected near the extruder"
        current_step:
          type: integer
          minimum: 0
          example: 2
        total_steps:
          type: integer
          minimum: 0
          example: 5
        created_at:
          type: string
          format: date-time
          example: "2026-04-12T14:30:00Z"
        last_activity:
          type: string
          format: date-time
          example: "2026-04-12T14:35:00Z"

    SessionList:
      type: object
      required: [sessions, count, total, total_pages, page, page_size]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        count:
          type: integer
          minimum: 0
          description: Number of sessions in this page.
          example: 3
        total:
          type: integer
          minimum: 0
          description: Total number of sessions matching the current filters.
          example: 47
        total_pages:
          type: integer
          minimum: 1
          description: Total number of pages at the requested page_size.
          example: 3
        page:
          type: integer
          minimum: 1
          description: Current page number (1-based).
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page.
          example: 20

    CreateSessionRequest:
      type: object
      properties:
        device_brand:
          type: string
          maxLength: 100
          example: "Prusa"
          description: Must not contain '<' or '>'. Max 100 characters.
        device_model:
          type: string
          maxLength: 100
          example: "MK4"
          description: Must not contain '<' or '>'. Max 100 characters.

    HealthResponse:
      type: object
      required: [status, service, version, uptime, active_connections, memory_mb, db_status]
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"
        service:
          type: string
          example: "physicscopilot"
        version:
          type: string
          example: "0.1.0"
        uptime:
          type: string
          description: Duration since server start in Go duration format.
          example: "3h14m22s"
        active_connections:
          type: integer
          minimum: 0
          example: 2
        memory_mb:
          type: integer
          minimum: 0
          description: Heap memory allocated in MB.
          example: 18
        db_status:
          type: string
          enum: [ok, unavailable, not_configured]
          description: |
            - `ok` — Postgres is reachable.
            - `unavailable` — DATABASE_URL set but Postgres unreachable.
            - `not_configured` — DATABASE_URL not set.
          example: "not_configured"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "session \"xyz\" not found"

paths:
  /version:
    get:
      summary: Build version information
      description: |
        Returns build version metadata baked in at startup. The response is
        publicly cacheable for one hour because version metadata changes only
        on deployment.
      tags: [Monitoring]
      responses:
        '200':
          description: Version metadata
          headers:
            Cache-Control:
              description: Version metadata is stable between deploys.
              schema:
                type: string
                example: "public, max-age=3600"
          content:
            application/json:
              schema:
                type: object
                required: [version, build_time, go_version, api_version]
                properties:
                  version:
                    type: string
                    description: Semantic version of the server binary.
                    example: "0.1.0"
                  build_time:
                    type: string
                    description: ISO-8601 timestamp of when the binary was built.
                    example: "2026-04-12T14:00:00Z"
                  go_version:
                    type: string
                    description: Go toolchain version used to compile the binary.
                    example: "go1.23.0"
                  api_version:
                    type: string
                    description: API generation (always "v1" for this service).
                    example: "v1"

  /health:
    get:
      summary: Server health check
      description: |
        Returns server liveness, build version, uptime, open WebSocket connections,
        heap memory usage, and optional Postgres reachability.
        Rate-limited to 60 req/min per IP.
      tags: [Monitoring]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint
      description: |
        Exposes Prometheus metrics in the standard text exposition format.
        Requires HTTP Basic Auth. If `METRICS_PASSWORD` is not set the endpoint
        returns 503 (disabled) regardless of credentials.
      tags: [Monitoring]
      security:
        - basicAuth: []
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Missing or invalid Basic Auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Endpoint disabled — METRICS_PASSWORD env var not set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/docs:
    get:
      summary: OpenAPI specification (this document)
      description: Serves the OpenAPI 3.0 YAML specification for this API.
      tags: [Monitoring]
      responses:
        '200':
          description: OpenAPI YAML spec
          content:
            application/yaml:
              schema:
                type: string

  /api/sessions:
    post:
      summary: Create a new session
      description: |
        Creates an in-memory session associated with the given device.
        Input validation: each field max 100 chars, no '<' or '>' characters.
      tags: [Sessions]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Malformed request body or invalid field values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List all sessions
      description: |
        Returns a paginated, filtered, and sorted list of sessions.
        All query parameters are optional and may be combined freely.
      tags: [Sessions]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 1-based page number (default 1).
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: Items per page (default 20, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort_by
          in: query
          description: Field to sort by.
          schema:
            type: string
            enum: [created_at, last_activity, status]
            default: last_activity
        - name: sort_order
          in: query
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: status
          in: query
          description: Exact match on session status (case-insensitive).
          schema:
            type: string
            example: active
        - name: device_brand
          in: query
          description: Exact match on device brand (case-insensitive).
          schema:
            type: string
            example: Prusa
        - name: problem
          in: query
          description: Substring match on problem_detected field (case-insensitive).
          schema:
            type: string
            example: stringing
      responses:
        '200':
          description: Paginated list of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: "a1b2c3d4e5f6"

    get:
      summary: Get a session by ID
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a session by ID
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session deleted
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/steps:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: "a1b2c3d4e5f6"

    get:
      summary: Get step progress for a session
      description: |
        Returns the current and total step counts for the session, along with a
        progress percentage. The response is not cached (Cache-Control: private, no-cache).
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Step progress for the session
          content:
            application/json:
              schema:
                type: object
                required: [session_id, current_step, total_steps, progress_pct]
                properties:
                  session_id:
                    type: string
                    example: "a1b2c3d4e5f6"
                  current_step:
                    type: integer
                    minimum: 0
                    example: 2
                  total_steps:
                    type: integer
                    minimum: 0
                    example: 5
                  progress_pct:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 100
                    example: 40.0
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/feedback:
    post:
      summary: Submit step feedback
      description: |
        Records positive or negative feedback for a specific repair step within a session.
        When no database is configured the feedback is only logged server-side.
      tags: [Sessions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, step_number, rating]
              properties:
                session_id:
                  type: string
                  example: "a1b2c3d4e5f6"
                step_number:
                  type: integer
                  minimum: 0
                  example: 1
                rating:
                  type: string
                  enum: [positive, negative]
                  example: "positive"
                comment:
                  type: string
                  maxLength: 1000
                  example: "The temperature fix worked perfectly."
      responses:
        '202':
          description: Feedback accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/stats:
    get:
      summary: Server statistics
      description: |
        Returns real-time server statistics: active sessions, open WebSocket connections,
        knowledge-base status, server uptime, and build version.
      tags: [Monitoring]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current server statistics
          content:
            application/json:
              schema:
                type: object
                required:
                  - active_sessions
                  - active_ws_connections
                  - total_sessions_started
                  - kb_loaded
                  - kb_entry_count
                  - uptime_seconds
                  - version
                  - total_messages
                properties:
                  active_sessions:
                    type: integer
                    minimum: 0
                    description: Number of in-memory sessions currently alive.
                    example: 3
                  active_ws_connections:
                    type: integer
                    minimum: 0
                    description: Number of open WebSocket connections.
                    example: 2
                  total_sessions_started:
                    type: integer
                    minimum: 0
                    description: Cumulative sessions started since server boot (from metrics).
                    example: 42
                  kb_loaded:
                    type: boolean
                    description: Whether the knowledge base is loaded and ready.
                    example: true
                  kb_entry_count:
                    type: integer
                    minimum: 0
                    description: Number of knowledge-base entries currently loaded.
                    example: 128
                  uptime_seconds:
                    type: integer
                    minimum: 0
                    description: Seconds elapsed since server start.
                    example: 3600
                  version:
                    type: string
                    description: Build version string.
                    example: "0.1.0"
                  total_messages:
                    type: integer
                    minimum: 0
                    description: Total messages across all active sessions.
                    example: 17
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/domains:
    get:
      summary: List available knowledge-base domains
      description: |
        Returns the list of problem domains currently loaded in the knowledge base
        (e.g. "hvac", "printer", "smartphone").

        The response includes an ETag header. Clients may send If-None-Match with
        the ETag value to receive a 304 Not Modified response when the domain list
        has not changed. The list is publicly cacheable for 5 minutes.
      tags: [Knowledge Base]
      security:
        - bearerAuth: []
      parameters:
        - name: If-None-Match
          in: header
          required: false
          description: ETag from a previous response; triggers 304 when unchanged.
          schema:
            type: string
            example: 'W/"a1b2c3d4e5f6g7h8"'
      responses:
        "200":
          description: List of domain identifiers
          headers:
            ETag:
              description: Weak ETag over the domain list (SHA-256 of JSON, first 8 bytes).
              schema:
                type: string
                example: 'W/"a1b2c3d4e5f6g7h8"'
            Cache-Control:
              description: Public cache directive — clients and CDNs may cache for 5 minutes.
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      type: string
                    example: ["hvac", "printer", "smartphone", "appliances"]
        "304":
          description: Not Modified — domain list unchanged since the ETag was issued.
        "429":
          $ref: '#/components/responses/TooManyRequests'
