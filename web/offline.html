<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sei offline | PhysicsCopilot</title>

  <!-- Fonts: Syne (display) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #06090F;
      --bg-2:          #0A0F1A;
      --accent:        #00E5A0;
      --accent-glow:   rgba(0,229,160,0.22);
      --blue:          #4F8EF7;
      --text:          #EDF2FF;
      --text-muted:    #6B7FA3;
      --border:        rgba(255,255,255,0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Radial glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(0,229,160,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(79,142,247,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    h1, .brand { font-family: 'Syne', sans-serif; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 28px;
      text-align: center;
    }

    .brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .brand a {
      color: var(--accent);
      text-decoration: none;
    }

    .icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0,229,160,0.08);
      border: 1.5px solid rgba(0,229,160,0.2);
      margin: 0 auto 32px;
      box-shadow: 0 0 40px rgba(0,229,160,0.12);
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      color: var(--accent);
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    .subtext {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 48px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #06090F;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 28px rgba(0,229,160,0.35);
    }

    .btn-home:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 4px 36px rgba(0,229,160,0.45);
    }

    .btn-home:active { transform: translateY(0); }

    .btn-home svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      margin: 40px auto 0;
      border-radius: 2px;
      opacity: 0.4;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    .brand     { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.1s both; }
    .icon-wrap { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.2s both; }
    .headline  { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.3s both; }
    .subtext   { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.4s both; }
    .btn-home  { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.5s both; }
    .divider   { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.6s both; }

    @media (prefers-reduced-motion: reduce) {
      .brand, .icon-wrap, .headline, .subtext, .btn-home, .divider {
        animation: none;
      }
    }

    @media (max-width: 480px) {
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="brand"><a href="/">PhysicsCopilot</a></p>

    <!-- Wifi-off icon (inline SVG, no external deps) -->
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <h1 class="headline">Sei offline</h1>

    <p class="subtext">
      Nessuna connessione disponibile. Riconnettiti a Internet per continuare a usare PhysicsCopilot.
    </p>

    <a href="/" class="btn-home">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 1L1 8h2v6h4v-4h2v4h4V8h2L8 1z" fill="currentColor"/>
      </svg>
      Torna alla home
    </a>

    <div class="divider"></div>
  </div>
</body>
</html>
