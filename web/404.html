<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | PhysicsCopilot</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://physicscopilot.app" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />

  <!-- Fonts: Syne (display) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #06090F;
      --bg-2:          #0A0F1A;
      --accent:        #00E5A0;
      --accent-dim:    rgba(0,229,160,0.12);
      --accent-glow:   rgba(0,229,160,0.22);
      --accent-border: rgba(0,229,160,0.25);
      --blue:          #4F8EF7;
      --text:          #EDF2FF;
      --text-muted:    #6B7FA3;
      --border:        rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Radial glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(0,229,160,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(79,142,247,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Typography */
    h1, h2, .brand { font-family: 'Syne', sans-serif; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 28px;
      text-align: center;
    }

    /* Brand bar */
    .brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .brand a {
      color: var(--accent);
      text-decoration: none;
    }

    /* 404 number */
    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(7rem, 22vw, 14rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      /* Subtle glow effect */
      filter: drop-shadow(0 0 40px rgba(0,229,160,0.25));
    }

    /* Headline */
    .headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    /* Subtext */
    .subtext {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 48px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    /* CTA button */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #06090F;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 28px rgba(0,229,160,0.35);
    }

    .btn-home:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 4px 36px rgba(0,229,160,0.45);
    }

    .btn-home:active {
      transform: translateY(0);
    }

    .btn-home svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Divider line */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      margin: 40px auto 0;
      border-radius: 2px;
      opacity: 0.4;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    .brand     { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.1s both; }
    .error-code { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.2s both; }
    .headline  { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.3s both; }
    .subtext   { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.4s both; }
    .btn-home  { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.5s both; }
    .divider   { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) 0.6s both; }

    @media (prefers-reduced-motion: reduce) {
      .brand, .error-code, .headline, .subtext, .btn-home, .divider {
        animation: none;
      }
    }

    @media (max-width: 480px) {
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="brand"><a href="/">PhysicsCopilot</a></p>

    <div class="error-code">404</div>

    <h1 class="headline">Page Not Found</h1>

    <p class="subtext">
      The page you're looking for doesn't exist or has been moved.
    </p>

    <a href="/" class="btn-home">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 1L1 8h2v6h4v-4h2v4h4V8h2L8 1z" fill="currentColor"/>
      </svg>
      Back to Home
    </a>

    <div class="divider"></div>
  </div>
</body>
</html>
