openapi: "3.0.3"
info:
  title: PhysicsCopilot API
  version: "0.1.0"
  description: |
    REST and WebSocket API for the PhysicsCopilot AI repair-assistant server.

    **Authentication:**
    - `/api/*` — Bearer JWT via `Authorization: Bearer <token>` header or `?token=<jwt>` query param.
      When `SUPABASE_JWT_SECRET` is not set the server runs in dev mode and skips validation.
    - `/metrics` — HTTP Basic Auth (username `admin`, password from `METRICS_PASSWORD` env var).

    **Rate limiting:** 60 requests/min per IP, burst 10, applied to `/health` and all `/api/*` routes.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-server.example.com
    description: Production (replace with your actual host)

tags:
  - name: Monitoring
    description: Health and observability endpoints
  - name: Sessions
    description: Session lifecycle management
  - name: Feedback
    description: User step-level feedback submission

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT. Pass via Authorization header or ?token= query param.
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Auth for /metrics (username "admin", password from METRICS_PASSWORD).

  schemas:
    Device:
      type: object
      required: [brand, model]
      properties:
        brand:
          type: string
          example: "Prusa"
        model:
          type: string
          example: "MK4"

    Session:
      type: object
      required: [id, status, device, current_step, total_steps, created_at, last_activity]
      properties:
        id:
          type: string
          example: "a1b2c3d4e5f6"
        status:
          type: string
          enum: [active]
          example: "active"
        device:
          $ref: '#/components/schemas/Device'
        problem_detected:
          type: string
          nullable: true
          description: Detected problem description, omitted when null.
          example: "Stringing detected near the extruder"
        current_step:
          type: integer
          minimum: 0
          example: 2
        total_steps:
          type: integer
          minimum: 0
          example: 5
        created_at:
          type: string
          format: date-time
          example: "2026-04-12T14:30:00Z"
        last_activity:
          type: string
          format: date-time
          example: "2026-04-12T14:35:00Z"

    SessionList:
      type: object
      required: [sessions, count]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        count:
          type: integer
          minimum: 0
          example: 3

    CreateSessionRequest:
      type: object
      properties:
        device_brand:
          type: string
          maxLength: 100
          example: "Prusa"
          description: Must not contain '<' or '>'. Max 100 characters.
        device_model:
          type: string
          maxLength: 100
          example: "MK4"
          description: Must not contain '<' or '>'. Max 100 characters.

    HealthResponse:
      type: object
      required: [status, service, version, uptime, active_connections, memory_mb, db_status]
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"
        service:
          type: string
          example: "physicscopilot"
        version:
          type: string
          example: "0.1.0"
        uptime:
          type: string
          description: Duration since server start in Go duration format.
          example: "3h14m22s"
        active_connections:
          type: integer
          minimum: 0
          example: 2
        memory_mb:
          type: integer
          minimum: 0
          description: Heap memory allocated in MB.
          example: 18
        db_status:
          type: string
          enum: [ok, unavailable, not_configured]
          description: |
            - `ok` — Postgres is reachable.
            - `unavailable` — DATABASE_URL set but Postgres unreachable.
            - `not_configured` — DATABASE_URL not set.
          example: "not_configured"

    FeedbackRequest:
      type: object
      required: [session_id, step_number, rating]
      properties:
        session_id:
          type: string
          description: Session ID returned by POST /api/sessions. Must not contain HTML characters.
          example: "a1b2c3d4e5f6"
        step_number:
          type: integer
          minimum: 0
          description: Step index the feedback refers to (0-based).
          example: 2
        rating:
          type: string
          enum: [positive, negative]
          description: User rating for the step guidance.
          example: "positive"
        comment:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional free-text comment. Max 1000 characters.
          example: "The instruction was clear but the arrow was pointing the wrong way."

    FeedbackResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"

    VersionResponse:
      type: object
      required: [version, build_time, go_version, api_version]
      properties:
        version:
          type: string
          example: "0.1.0"
        build_time:
          type: string
          format: date-time
          example: "2026-04-12T00:00:00Z"
        go_version:
          type: string
          example: "go1.24.1"
        api_version:
          type: string
          example: "v1"

    StatsResponse:
      type: object
      required: [active_sessions, active_ws_connections, total_sessions_started, kb_loaded, kb_entry_count, uptime_seconds, version, total_messages]
      properties:
        active_sessions:
          type: integer
          minimum: 0
          example: 3
        active_ws_connections:
          type: integer
          minimum: 0
          example: 1
        total_sessions_started:
          type: integer
          format: uint64
          minimum: 0
          example: 42
        kb_loaded:
          type: boolean
          example: true
        kb_entry_count:
          type: integer
          minimum: 0
          example: 95
        uptime_seconds:
          type: integer
          minimum: 0
          example: 3672
        version:
          type: string
          example: "0.1.0"
        total_messages:
          type: integer
          minimum: 0
          example: 18

    SessionStepsResponse:
      type: object
      required: [session_id, current_step, total_steps, progress_pct]
      properties:
        session_id:
          type: string
          example: "a1b2c3d4e5f6"
        current_step:
          type: integer
          minimum: 0
          example: 3
        total_steps:
          type: integer
          minimum: 0
          example: 5
        progress_pct:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 60.0

    ConversationMessage:
      type: object
      required: [role, content, timestamp]
      properties:
        role:
          type: string
          enum: [user, assistant]
          example: "user"
        content:
          type: string
          example: "My nozzle seems clogged."
        timestamp:
          type: string
          format: date-time
          example: "2026-04-12T14:31:00Z"
        has_image:
          type: boolean
          example: false

    SessionMessagesResponse:
      type: object
      required: [session_id, count, messages]
      properties:
        session_id:
          type: string
          example: "a1b2c3d4e5f6"
        count:
          type: integer
          minimum: 0
          example: 4
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ConversationMessage'

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "session \"xyz\" not found"

paths:
  /health:
    get:
      summary: Server health check
      description: |
        Returns server liveness, build version, uptime, open WebSocket connections,
        heap memory usage, and optional Postgres reachability.
        Rate-limited to 60 req/min per IP.
      tags: [Monitoring]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "ok"
                service: "physicscopilot"
                version: "0.1.0"
                uptime: "3h14m22s"
                active_connections: 2
                memory_mb: 18
                db_status: "not_configured"

  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint
      description: |
        Exposes Prometheus metrics in the standard text exposition format.
        Requires HTTP Basic Auth. If `METRICS_PASSWORD` is not set the endpoint
        returns 503 (disabled) regardless of credentials.
      tags: [Monitoring]
      security:
        - basicAuth: []
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP http_requests_total Total number of HTTP requests.
                # TYPE http_requests_total counter
                http_requests_total{method="GET",path="/health",status="200"} 142
        '401':
          description: Missing or invalid Basic Auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Endpoint disabled — METRICS_PASSWORD env var not set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/docs:
    get:
      summary: OpenAPI specification (this document)
      description: Serves the OpenAPI 3.0 YAML specification for this API.
      tags: [Monitoring]
      responses:
        '200':
          description: OpenAPI YAML spec
          content:
            application/yaml:
              schema:
                type: string

  /api/sessions:
    post:
      summary: Create a new session
      description: |
        Creates an in-memory session associated with the given device.
        The session is also persisted to Postgres if `DATABASE_URL` is set.
        Input validation: each field max 100 chars, no `<` or `>` characters.
      tags: [Sessions]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            example:
              device_brand: "Prusa"
              device_model: "MK4"
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Malformed request body or invalid field values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List all sessions
      description: |
        Returns active in-memory sessions with pagination, sorting, and filtering.
        Supports ETag-based conditional requests (304 Not Modified).
      tags: [Sessions]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 1-based page number.
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page (max 100).
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, last_activity, status]
            default: last_activity
          description: Field to sort by.
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction.
        - name: device_brand
          in: query
          schema:
            type: string
          description: Exact match on device brand (case-insensitive).
          example: "Prusa"
        - name: problem
          in: query
          schema:
            type: string
          description: Substring match on problem_detected (case-insensitive).
          example: "stringing"
        - name: status
          in: query
          schema:
            type: string
          description: Exact match on session status (case-insensitive).
          example: "active"
      responses:
        '200':
          description: Paginated list of sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SessionList'
                  - type: object
                    required: [page, page_size, total, total_pages]
                    properties:
                      page:
                        type: integer
                        example: 1
                      page_size:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 42
                      total_pages:
                        type: integer
                        example: 3
        '304':
          description: Not Modified — ETag matches, client cache is current
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Session ID returned by POST /api/sessions
        example: "a1b2c3d4e5f6"

    get:
      summary: Get a session by ID
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a session by ID
      description: |
        Removes the session from in-memory store and soft-deletes it in Postgres
        (status set to `completed`) if DATABASE_URL is configured.
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session deleted — no response body
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/feedback:
    post:
      summary: Submit step-level feedback
      description: |
        Records user feedback (positive/negative rating and optional comment)
        for a specific step in a guided repair session.

        The response is always `202 Accepted` even when DB persistence fails — feedback
        submission must never block the client experience.

        When `DATABASE_URL` is not set, feedback is logged server-side only.
      tags: [Feedback]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            example:
              session_id: "a1b2c3d4e5f6"
              step_number: 2
              rating: "positive"
              comment: "The instruction was clear and concise."
      responses:
        '202':
          description: Feedback accepted (persisted or logged)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
              example:
                status: "ok"
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_session_id:
                  value: { "error": "session_id is required" }
                invalid_rating:
                  value: { "error": "rating must be \"positive\" or \"negative\"" }
                comment_too_long:
                  value: { "error": "comment exceeds maximum length of 1000 characters" }
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /docs:
    get:
      summary: Swagger UI — interactive API explorer
      description: |
        Serves a self-contained HTML page that embeds Swagger UI (via unpkg CDN)
        pointed at the OpenAPI spec at `/api/docs`. Open in a browser to explore
        and try every endpoint interactively. Publicly cacheable for 1 hour.
      tags: [Monitoring]
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /version:
    get:
      summary: Build version information
      description: |
        Returns the server version, build timestamp, Go runtime version, and API
        generation string. Response is publicly cacheable for 1 hour — version
        metadata changes only on deployment.
      tags: [Monitoring]
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
              example:
                version: "0.1.0"
                build_time: "2026-04-12T00:00:00Z"
                go_version: "go1.24.1"
                api_version: "v1"

  /api/stats:
    get:
      summary: Server operational statistics
      description: |
        Returns live server statistics including session counts, active WebSocket
        connections, knowledge-base status, uptime, and the running version.
      tags: [Monitoring]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current server statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/steps:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Session ID returned by POST /api/sessions
        example: "a1b2c3d4e5f6"
    get:
      summary: Get step progress for a session
      description: |
        Returns the current step, total steps, and computed progress percentage
        for the guided repair flow associated with the session.
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Step progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStepsResponse'
              example:
                session_id: "a1b2c3d4e5f6"
                current_step: 3
                total_steps: 5
                progress_pct: 60.0
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/messages:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Session ID returned by POST /api/sessions
        example: "a1b2c3d4e5f6"
    get:
      summary: Get conversation history for a session
      description: |
        Returns the conversation messages for a session (rolling window of the last
        20 messages). Returns an empty array when no messages have been exchanged yet.
        The `Cache-Control: private, no-cache` header ensures clients always
        revalidate before using a cached response.
      tags: [Sessions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conversation history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMessagesResponse'
              example:
                session_id: "a1b2c3d4e5f6"
                count: 2
                messages:
                  - role: "user"
                    content: "My nozzle seems clogged."
                    timestamp: "2026-04-12T14:31:00Z"
                    has_image: false
                  - role: "assistant"
                    content: "Try a cold pull to clear the blockage."
                    timestamp: "2026-04-12T14:31:05Z"
                    has_image: false
        '401':
          description: Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# ---------------------------------------------------------------------------
# WebSocket endpoint — documented as a note (not natively supported by OAS 3.0)
# ---------------------------------------------------------------------------
# Endpoint:  GET /ws  (upgrade to WebSocket)
# Auth:      Bearer JWT via ?token=<jwt> query param or Authorization header.
#            Skipped when SUPABASE_JWT_SECRET is not set (dev mode).
# Limits:
#   - Max 10 concurrent connections per source IP
#   - Max message size: 10 MB per frame
#   - Frame rate: 5 camera frames/sec per connection (WS_MAX_FPS env var, range 1–30)
#   - Server heartbeat: Ping every 30 s, connection closed if no Pong in 40 s
#
# Client → Server message types: frame | text | ping
# Server → Client message types: response | pong | error
#
# See docs/WEBSOCKET_PROTOCOL.md for the full WebSocket protocol documentation
# including message schemas, overlay coordinates, close codes, and reconnection strategy.
